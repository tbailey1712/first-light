# First Light — Phase 1 MVP
# Network observability with CrowdSec threat intelligence + SigNoz unified observability

# Include SigNoz's official stack (ClickHouse, OTel collector, query service, frontend)
include:
  - signoz/docker-compose.yaml

services:
  # ── rsyslog — Fan-out router ─────────────────────────────────
  # Receives syslog on UDP/TCP 514, routes to:
  #   1. SigNoz OTel collector (TCP 5140)
  #   2. /var/log/remote/{host}/syslog.log files for CrowdSec
  rsyslog:
    image: rsyslog/syslog_appliance_alpine:latest
    container_name: fl-rsyslog
    restart: unless-stopped
    environment:
      - TZ=America/Chicago
    ports:
      - "514:514/udp"
      - "514:514/tcp"
    volumes:
      - ./rsyslog/rsyslog.conf:/etc/rsyslog.conf:ro
      - syslog_files:/var/log/remote
    networks:
      - signoz-net
    depends_on:
      - otel-collector

  # ── Telegraf — SNMP metrics collection ───────────────────────
  # Native SNMP polling, sends metrics directly to SigNoz via OTLP
  # Replaces snmp-exporter + otel-snmp (which had prometheus receiver bugs)
  telegraf-snmp:
    image: telegraf:1.32-alpine
    container_name: fl-telegraf-snmp
    restart: unless-stopped
    environment:
      - TZ=America/Chicago
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    networks:
      - signoz-net

  # ── DEPRECATED: SNMP Exporter (replaced by Telegraf) ─────────
  # snmp-exporter:
  #   image: prom/snmp-exporter:v0.26.0
  #   container_name: fl-snmp-exporter
  #   restart: unless-stopped
  #   environment:
  #     - TZ=America/Chicago
  #   volumes:
  #     - ./snmp-exporter/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
  #   ports:
  #     - "9116:9116"
  #   networks:
  #     - signoz-net

  # ── DEPRECATED: OTel SNMP Sidecar (prometheus receiver broken) ─
  # otel-snmp:
  #   image: otel/opentelemetry-collector-contrib:0.118.0
  #   container_name: fl-otel-snmp
  #   restart: unless-stopped
  #   environment:
  #     - TZ=America/Chicago
  #   volumes:
  #     - ./otel-snmp/config.yaml:/etc/otelcol-contrib/config.yaml:ro
  #   networks:
  #     - signoz-net
  #   depends_on:
  #     - snmp-exporter

  # ── CrowdSec — Threat detection ──────────────────────────────
  # Tails log files written by rsyslog, runs community parsers/scenarios
  # Detection-only for MVP (no bouncers yet)
  crowdsec:
    image: crowdsecurity/crowdsec:v1.6.3
    container_name: fl-crowdsec
    restart: unless-stopped
    environment:
      - COLLECTIONS=crowdsecurity/pfsense crowdsecurity/linux crowdsecurity/sshd
      - ENROLL_KEY=${CROWDSEC_ENROLLMENT_KEY:-}
      - TZ=America/Chicago
    volumes:
      - crowdsec_data:/var/lib/crowdsec/data
      - crowdsec_config:/etc/crowdsec
      - ./crowdsec/acquis.yml:/etc/crowdsec/acquis.d/first-light.yml:ro
      - syslog_files:/var/log/remote:ro
    networks:
      - signoz-net

  # ── Webhook Relay — SigNoz to Telegram ───────────────────────
  # Receives Alertmanager-format webhooks from SigNoz
  # Translates and forwards alerts to Telegram bot
  webhook-relay:
    build: ./webhook-relay
    container_name: fl-webhook-relay
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - TZ=America/Chicago
    ports:
      - "5001:5000"
    networks:
      - signoz-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── MCP Server — Model Context Protocol (HTTP) ────────────────
  # Exposes DNS security tools via MCP over HTTP for Claude Desktop
  # Access at: http://localhost:8082
  mcp-server:
    build:
      context: .
      dockerfile: mcp_servers/Dockerfile
    container_name: fl-mcp
    restart: unless-stopped
    environment:
      - SIGNOZ_BASE_URL=${SIGNOZ_BASE_URL}
      - SIGNOZ_CLICKHOUSE_HOST=${SIGNOZ_CLICKHOUSE_HOST}
      - SIGNOZ_CLICKHOUSE_USER=${SIGNOZ_CLICKHOUSE_USER}
      - SIGNOZ_CLICKHOUSE_PASSWORD=${SIGNOZ_CLICKHOUSE_PASSWORD}
      - TZ=America/Chicago
    ports:
      - "8082:8080"  # Host 8082 → Container 8080 (8081 used by SigNoz)
    networks:
      - signoz-net
    depends_on:
      - clickhouse
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Agent Scheduler — Daily threat assessment reports ─────────
  # Runs the LangGraph agent on a schedule to generate and send reports
  # Daily report: 08:00 America/Chicago
  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    container_name: fl-agent
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=America/Chicago
      - DAILY_REPORT_HOUR=8
      - DAILY_REPORT_MINUTE=0
      - FIRST_LIGHT_REPORTS_DIR=/data/reports
    volumes:
      - agent_reports:/data/reports
      - /data/compose/7/uptimekuma_data:/data/uptimekuma:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - signoz-net
    depends_on:
      - clickhouse
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import apscheduler; print('ok')"]
      interval: 60s
      timeout: 10s
      retries: 3

  # ── Redis — Conversation state + distributed locks ───────────
  redis:
    image: redis:7-alpine
    container_name: fl-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - signoz-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Telegram Bot — Interactive AI assistant ──────────────────
  # Handles /status /report /ask commands + free-text queries
  # Reuses the agent Dockerfile with a command override
  telegram-bot:
    build:
      context: .
      dockerfile: agent/Dockerfile
    container_name: fl-telegram-bot
    restart: unless-stopped
    command: ["python", "-m", "bot.telegram_bot"]
    env_file: .env
    environment:
      - TZ=America/Chicago
    volumes:
      - agent_reports:/data/reports:ro
      - /data/compose/7/uptimekuma_data:/data/uptimekuma:ro
    networks:
      - signoz-net
    depends_on:
      - clickhouse
      - redis
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    profiles:
      - bots

  # ── Slack Bot — Interactive AI assistant (Socket Mode) ────────
  # Handles /firstlight slash command + @mentions
  # Requires SLACK_BOT_TOKEN and SLACK_APP_TOKEN
  slack-bot:
    build:
      context: .
      dockerfile: agent/Dockerfile
    container_name: fl-slack-bot
    restart: unless-stopped
    command: ["python", "-m", "bot.slack_bot"]
    env_file: .env
    environment:
      - TZ=America/Chicago
    volumes:
      - agent_reports:/data/reports:ro
      - /data/compose/7/uptimekuma_data:/data/uptimekuma:ro
    networks:
      - signoz-net
    depends_on:
      - clickhouse
      - redis
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    profiles:
      - bots

  # ── Management UI — FastAPI + HTMX dashboard ─────────────────
  # Reports browser, on-demand triggers, system status
  # Access at: http://<host>:8085
  ui:
    build:
      context: .
      dockerfile: agent/Dockerfile
    container_name: fl-ui
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "ui.app:app", "--host", "0.0.0.0", "--port", "8085"]
    env_file: .env
    environment:
      - TZ=America/Chicago
      - FIRST_LIGHT_REPORTS_DIR=/data/reports
    volumes:
      - agent_reports:/data/reports
      - /data/compose/7/uptimekuma_data:/data/uptimekuma:ro
    ports:
      - "8085:8085"
    networks:
      - signoz-net
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8085/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Threat Intel Enricher — Batch IP enrichment ──────────────
  # Queries ClickHouse for security events, enriches IPs via threat intel APIs
  # Stores results in ClickHouse for query-time joins
  threat-intel-enricher:
    build: ./services/threat-intel-enricher
    container_name: fl-threat-intel-enricher
    restart: unless-stopped
    environment:
      - CLICKHOUSE_URL=http://clickhouse:8123
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY}
      - ALIENVAULT_API_KEY=${ALIENVAULT_API_KEY}
      - THREAT_INTEL_CACHE_DIR=/data/threat_intel_cache
      - ENRICHMENT_BATCH_SIZE=20
      - ENRICHMENT_INTERVAL_MINUTES=60
      - ENRICHMENT_LOOKBACK_HOURS=24
      - ENRICHMENT_MAX_AGE_HOURS=168
      - ENRICHMENT_MIN_BLOCK_COUNT=5
      - ABUSEIPDB_DAILY_BUDGET=900
      - METRICS_PORT=9006
      - TZ=America/Chicago
    volumes:
      - threat_intel_cache:/data/threat_intel_cache
      - ./agent/tools:/app/agent/tools:ro
    ports:
      - "9006:9006"  # Prometheus metrics
    networks:
      - signoz-net
    depends_on:
      - clickhouse
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9006')"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  syslog_files:
    name: fl-syslog-files
  crowdsec_data:
    name: fl-crowdsec-data
  crowdsec_config:
    name: fl-crowdsec-config
  threat_intel_cache:
    name: fl-threat-intel-cache
  agent_reports:
    name: fl-agent-reports
  redis_data:
    name: fl-redis-data

networks:
  signoz-net:
    name: signoz-net
