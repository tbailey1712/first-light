[pytest]
# Pytest configuration for First Light integration tests

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers
markers =
    integration: Integration tests that make real API calls (no mocks)
    unit: Unit tests with mocks
    slow: Tests that take significant time to run
    requires_langfuse: Tests that require Langfuse connectivity
    requires_litellm: Tests that require LiteLLM router connectivity

# Test paths
testpaths = tests

# Environment
env_files = .env
