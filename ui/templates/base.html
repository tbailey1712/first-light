<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}First Light{% endblock %}</title>
  <script src="/static/htmx.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #232738;
      --border: #2e3347;
      --text: #e2e8f0;
      --muted: #8892a4;
      --accent: #6366f1;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --radius: 8px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; line-height: 1.6; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 32px; height: 52px; }
    nav .brand { font-weight: 700; font-size: 16px; color: var(--text); }
    nav .brand span { color: var(--accent); }
    nav a { color: var(--muted); font-size: 13px; font-weight: 500; }
    nav a:hover { color: var(--text); text-decoration: none; }
    .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
    .page-title { font-size: 22px; font-weight: 700; margin-bottom: 24px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 12px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-green { background: #14532d; color: var(--green); }
    .badge-red { background: #450a0a; color: var(--red); }
    .badge-yellow { background: #422006; color: var(--yellow); }
    .badge-gray { background: var(--surface2); color: var(--muted); }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); padding: 8px 12px; border-bottom: 1px solid var(--border); }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }
    .btn { display: inline-block; padding: 8px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; border: none; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #5254cc; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .dot-green { background: var(--green); }
    .dot-red { background: var(--red); }
    .dot-gray { background: var(--muted); }
    pre { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; overflow-x: auto; font-size: 13px; white-space: pre-wrap; word-break: break-word; }
    .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; z-index: 100; }
    @media (max-width: 640px) { .grid2, .grid3 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <nav>
    <span class="brand">First <span>Light</span></span>
    <a href="/">Dashboard</a>
    <a href="/reports">Reports</a>
    <a href="/status">Status</a>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  <div id="toast" style="display:none" class="toast"></div>
  <script>
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 3000);
    }
    document.body.addEventListener('htmx:afterRequest', function(evt) {
      if (evt.detail.successful) {
        try {
          const data = JSON.parse(evt.detail.xhr.responseText);
          if (data.message) showToast(data.message);
        } catch(e) {}
      }
    });
  </script>
</body>
</html>
