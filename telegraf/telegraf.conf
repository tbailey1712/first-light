# Telegraf Configuration for SNMP → SigNoz
# Replaces snmp-exporter + otel-snmp with native SNMP collection

[agent]
  interval = "60s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  flush_interval = "10s"
  hostname = "fl-telegraf-snmp"
  debug = true

# ── SNMP Input: Switch ──
[[inputs.snmp]]
  agents = ["192.168.1.2:161"]
  version = 2
  community = "public"
  interval = "60s"
  timeout = "30s"
  retries = 3

  [inputs.snmp.tags]
    device = "switch.mcducklabs.com"
    device_type = "switch"
    instance = "192.168.1.2"

  # System info
  [[inputs.snmp.field]]
    name = "hostname"
    oid = "1.3.6.1.2.1.1.5.0"
    is_tag = true

  [[inputs.snmp.field]]
    name = "uptime"
    oid = "1.3.6.1.2.1.1.3.0"

  # Interface metrics table
  [[inputs.snmp.table]]
    name = "interface"
    inherit_tags = ["device", "device_type"]

    [[inputs.snmp.table.field]]
      name = "name"
      oid = "1.3.6.1.2.1.31.1.1.1.1"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "descr"
      oid = "1.3.6.1.2.1.2.2.1.2"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "in_octets"
      oid = "1.3.6.1.2.1.31.1.1.1.6"

    [[inputs.snmp.table.field]]
      name = "out_octets"
      oid = "1.3.6.1.2.1.31.1.1.1.10"

    [[inputs.snmp.table.field]]
      name = "in_errors"
      oid = "1.3.6.1.2.1.2.2.1.14"

    [[inputs.snmp.table.field]]
      name = "out_errors"
      oid = "1.3.6.1.2.1.2.2.1.20"

    [[inputs.snmp.table.field]]
      name = "in_discards"
      oid = "1.3.6.1.2.1.2.2.1.13"

    [[inputs.snmp.table.field]]
      name = "out_discards"
      oid = "1.3.6.1.2.1.2.2.1.19"

# ── Processor: Translate switch port SNMP names → human labels ──
# The TP-Link SG2424 reports ifName as "port N: Gigabit Copper" which is meaningless.
# This maps each port to its actual label from the switch port map doc.
[[processors.enum]]
  namepass = ["interface"]
  [processors.enum.tagpass]
    device = ["switch.mcducklabs.com"]

  [[processors.enum.mapping]]
    tag = "name"
    dest = "name"
    [processors.enum.mapping.value_mappings]
      "port 1: Gigabit Copper"  = "port 1: AP-2F-Back (unifi-2f-back) — TRUNK V1/V2/V3"
      "port 2: Gigabit Copper"  = "port 2: Floor1-Desk (Intel NUC fam-desk)"
      "port 3: Gigabit Copper"  = "port 3: MBR-Cabinet (Hue3/LiftMaster/Airthings) — IoT V2"
      "port 4: Gigabit Copper"  = "port 4: Ellie-Bedroom (empty)"
      "port 5: Gigabit Copper"  = "port 5: Backyard-Camera via PoE+EoC → 192.168.3.15 — CCTV V3"
      "port 6: Gigabit Copper"  = "port 6: Bsmt-Cabinet (empty) — IoT V2"
      "port 7: Gigabit Copper"  = "port 7: Office-Switch (printer + office devices)"
      "port 8: Gigabit Copper"  = "port 8: (available) — IoT V2"
      "port 9: Gigabit Copper"  = "port 9: QNAP-NAS TS-462 — IoT V2"
      "port 10: Gigabit Copper" = "port 10: AP-1F-Front (unifi-1f-front) — TRUNK V1/V2/V3"
      "port 11: Gigabit Copper" = "port 11: Alex-Bedroom (empty)"
      "port 12: Gigabit Copper" = "port 12: (available) — IoT V2"
      "port 13: Gigabit Copper" = "port 13: vldtr ETH validator — DMZ V4"
      "port 14: Gigabit Copper" = "port 14: Smart-Meter Rainforest — IoT V2"
      "port 15: Gigabit Copper" = "port 15: Camera-Front Hikvision — CCTV V3"
      "port 16: Gigabit Copper" = "port 16: Heatpump-GW Resideo — IoT V2"
      "port 17: Gigabit Copper" = "port 17: Proxmox-V2-NIC Supermicro eth2 — IoT V2"
      "port 18: Gigabit Copper" = "port 18: Supermicro-IPMI BMC — trusted V1"
      "port 19: Gigabit Copper" = "port 19: Proxmox-V1-NIC Supermicro eth1 — trusted V1"
      "port 20: Gigabit Copper" = "port 20: Garage-Switch + 3 downstream cameras — TRUNK V1/V3"
      "port 21: Gigabit Copper" = "port 21: AP-Basement (unifi-basement) — TRUNK V1/V2/V3"
      "port 22: Gigabit Copper" = "port 22: Proxmox-V4-NIC Supermicro eth0 SFP — DMZ V4"
      "port 23: Gigabit Copper" = "port 23: Firewall pfSense 3100 SFP — TRUNK V1/V2/V3/V4"
      "port 24: Gigabit Copper" = "port 24: rpi-ntop Raspberry Pi 4 ntopng — trusted V1"

