# ── OpenTelemetry Output → SigNoz ──
[[outputs.opentelemetry]]
  service_address = "signoz-otel-collector:4317"
  insecure_skip_verify = true
  timeout = "5s"
  compression = "gzip"

  [outputs.opentelemetry.attributes]
    source = "telegraf-snmp"
    deployment.environment = "production"
