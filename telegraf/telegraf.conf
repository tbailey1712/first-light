# Telegraf Configuration for SNMP → SigNoz
# Replaces snmp-exporter + otel-snmp with native SNMP collection

[agent]
  interval = "60s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  flush_interval = "10s"
  hostname = "fl-telegraf-snmp"

# ── SNMP Input: Switch ──
[[inputs.snmp]]
  agents = ["192.168.1.2:161"]
  version = 2
  community = "public"
  interval = "60s"
  timeout = "30s"
  retries = 3

  [inputs.snmp.tags]
    device = "switch.mcducklabs.com"
    device_type = "switch"
    instance = "192.168.1.2"

  # System info
  [[inputs.snmp.field]]
    name = "hostname"
    oid = "RFC1213-MIB::sysName.0"
    is_tag = true

  [[inputs.snmp.field]]
    name = "uptime"
    oid = "DISMAN-EXPRESSION-MIB::sysUpTimeInstance"

  # Interface metrics table
  [[inputs.snmp.table]]
    name = "interface"
    inherit_tags = ["device", "device_type"]

    [[inputs.snmp.table.field]]
      name = "name"
      oid = "IF-MIB::ifName"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "descr"
      oid = "IF-MIB::ifDescr"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "in_octets"
      oid = "IF-MIB::ifHCInOctets"

    [[inputs.snmp.table.field]]
      name = "out_octets"
      oid = "IF-MIB::ifHCOutOctets"

    [[inputs.snmp.table.field]]
      name = "in_errors"
      oid = "IF-MIB::ifInErrors"

    [[inputs.snmp.table.field]]
      name = "out_errors"
      oid = "IF-MIB::ifOutErrors"

    [[inputs.snmp.table.field]]
      name = "in_discards"
      oid = "IF-MIB::ifInDiscards"

    [[inputs.snmp.table.field]]
      name = "out_discards"
      oid = "IF-MIB::ifOutDiscards"

