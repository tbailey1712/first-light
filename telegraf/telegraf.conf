# Telegraf Configuration for SNMP → SigNoz
# Replaces snmp-exporter + otel-snmp with native SNMP collection

[agent]
  interval = "60s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  flush_interval = "10s"
  hostname = "fl-telegraf-snmp"

# ── SNMP Input: Switch ──
[[inputs.snmp]]
  agents = ["192.168.1.2:161"]
  version = 2
  community = "public"
  interval = "60s"
  timeout = "30s"
  retries = 3

  [inputs.snmp.tags]
    device = "switch.mcducklabs.com"
    device_type = "switch"
    instance = "192.168.1.2"

  # System info
  [[inputs.snmp.field]]
    name = "hostname"
    oid = "1.3.6.1.2.1.1.5.0"
    is_tag = true

  [[inputs.snmp.field]]
    name = "uptime"
    oid = "1.3.6.1.2.1.1.3.0"

  # Interface metrics table
  [[inputs.snmp.table]]
    name = "interface"
    inherit_tags = ["device", "device_type"]

    [[inputs.snmp.table.field]]
      name = "name"
      oid = "1.3.6.1.2.1.31.1.1.1.1"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "descr"
      oid = "1.3.6.1.2.1.2.2.1.2"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "in_octets"
      oid = "1.3.6.1.2.1.31.1.1.1.6"

    [[inputs.snmp.table.field]]
      name = "out_octets"
      oid = "1.3.6.1.2.1.31.1.1.1.10"

    [[inputs.snmp.table.field]]
      name = "in_errors"
      oid = "1.3.6.1.2.1.2.2.1.14"

    [[inputs.snmp.table.field]]
      name = "out_errors"
      oid = "1.3.6.1.2.1.2.2.1.20"

    [[inputs.snmp.table.field]]
      name = "in_discards"
      oid = "1.3.6.1.2.1.2.2.1.13"

    [[inputs.snmp.table.field]]
      name = "out_discards"
      oid = "1.3.6.1.2.1.2.2.1.19"

