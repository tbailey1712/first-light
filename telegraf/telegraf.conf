# ── Prometheus Input: Ethereum Validator - Nimbus (Consensus) ──
[[inputs.prometheus]]
  urls = ["http://vldtr.mcducklabs.com:8008/metrics"]
  interval = "60s"
  metric_version = 2

  [inputs.prometheus.tags]
    service_name = "eth-validator"
    client_type = "consensus"
    client_name = "nimbus"
    device = "vldtr.mcducklabs.com"
    device_type = "validator"
    network_vlan = "dmz"
    deployment_environment = "production"

# ── Prometheus Input: Ethereum Validator - Nethermind (Execution) ──
[[inputs.prometheus]]
  urls = ["http://vldtr.mcducklabs.com:6060/metrics"]
  interval = "60s"
  metric_version = 2

  [inputs.prometheus.tags]
    service_name = "eth-validator"
    client_type = "execution"
    client_name = "nethermind"
    device = "vldtr.mcducklabs.com"
    device_type = "validator"
    network_vlan = "dmz"
    deployment_environment = "production"

# ── OpenTelemetry Output → SigNoz ──
[[outputs.opentelemetry]]
  service_address = "signoz-otel-collector:4317"
  timeout = "5s"

  [outputs.opentelemetry.attributes]
    source = "telegraf-snmp"
    "deployment.environment" = "production"
