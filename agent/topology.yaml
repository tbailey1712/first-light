# First Light Network Topology
# Auto-discovered: 2026-02-16

network:
  vlans:
    - id: 1
      name: "Main Network"
      purpose: "Personal devices (Trusted)"
      security_level: "trusted"
      subnet: "192.168.1.0/24"

    - id: 2
      name: "IoT"
      purpose: "IoT devices with internet access"
      security_level: "restricted"
      subnet: "192.168.2.0/24"
      internet_access: true
      can_reach_vlan1: false

    - id: 3
      name: "Cameras"
      purpose: "Security cameras"
      security_level: "isolated"
      subnet: "192.168.3.0/24"
      internet_access: false
      fully_isolated: true

    - id: 4
      name: "DMZ"
      purpose: "Ethereum validator"
      security_level: "dmz"
      subnet: "192.168.4.0/24"
      internet_access: true
      can_reach_internal: false

    - id: 10
      name: "Guest"
      purpose: "WiFi guest network"
      security_level: "guest"
      subnet: "192.168.10.0/24"
      internet_only: true

devices:
  firewall:
    name: "pfSense Plus"
    hostname: "firewall.mcducklabs.com"
    type: "firewall"
    vendor: "Netgate"
    capabilities:
      - "syslog"
      - "packet_filtering"
      - "nat"
    data_sources:
      syslog:
        port: 5514
        setup: "Status → System Logs → Settings → Remote Logging → docker.mcducklabs.com:5514 UDP"

  dns:
    name: "AdGuard Home"
    hostname: "adguard.mcducklabs.com"
    port: 443
    protocol: "https"
    type: "dns_filter"
    capabilities:
      - "dns_filtering"
      - "query_logging"
      - "statistics_api"
    data_sources:
      api:
        endpoint: "https://adguard.mcducklabs.com/control"

  network_monitor:
    name: "ntopng"
    hostname: "ntopng.mcducklabs.com"
    port: 443
    protocol: "https"
    type: "flow_analyzer"
    vendor: "ntop"
    version: "6.7.260217"
    edition: "Community"
    arch: "aarch64"
    capabilities:
      - "real_time_traffic"
      - "protocol_analysis"
      - "top_talkers"
      - "interface_stats"
      - "alerts"
      - "prometheus_metrics"
    limitations:
      - "No historical flow export (Enterprise only)"
      - "No nProbe integration (Enterprise only)"
      - "No flow collection from external probes"
    data_sources:
      api:
        endpoint: "https://ntopng.mcducklabs.com"
        auth: "basic"
      prometheus:
        endpoint: "https://ntopng.mcducklabs.com/lua/metrics.lua"
        notes: "Enable in ntopng Preferences > Prometheus"

  switch:
    name: "TP-Link TL-SG2424"
    hostname: "switch.mcducklabs.com"
    type: "managed_switch"
    vendor: "TP-Link"
    model: "TL-SG2424"
    ports: 24
    capabilities:
      - "snmp"
      - "vlan"
      - "port_stats"
    data_sources:
      snmp:
        version: "2c"
        community: "public"

  wireless:
    name: "UniFi Controller"
    hostname: "unifi.mcducklabs.com"
    port: 8443
    type: "wireless_controller"
    vendor: "Ubiquiti"
    capabilities:
      - "ap_management"
      - "client_tracking"
      - "syslog"
    data_sources:
      api:
        endpoint: "https://unifi.mcducklabs.com:8443/api"

  validator:
    name: "Ethereum Validator"
    hostname: "vldtr.mcducklabs.com"
    vlan: 4
    type: "blockchain_validator"
    consensus_client:
      name: "Nimbus"
      version: "unknown"
      metrics_port: 8008
      api_port: 5052
    execution_client:
      name: "Nethermind"
      version: "1.36.0"
      metrics_port: 6060
      jsonrpc_port: 8545
    fee_recipient: "0xf22f398823BAC04290033a88C0d9439929b1085B"
    data_sources:
      prometheus:
        - "http://vldtr.mcducklabs.com:8008/metrics"
        - "http://vldtr.mcducklabs.com:6060/metrics"
      beacon_api:
        endpoint: "http://vldtr.mcducklabs.com:5052"

  uptime_monitor:
    name: "Uptime Kuma"
    hostname: "uptime.mcducklabs.com"
    port: 443
    protocol: "https"
    type: "uptime_monitor"
    capabilities:
      - "service_monitoring"
      - "api"
    data_sources:
      api:
        endpoint: "https://uptime.mcducklabs.com"

  hypervisor:
    name: "Proxmox VE"
    hostname: "pve.mcducklabs.com"
    port: 8006
    type: "hypervisor"
    vendor: "Proxmox"
    capabilities:
      - "vm_management"
      - "metrics_api"
      - "resource_monitoring"
    data_sources:
      api:
        endpoint: "https://pve.mcducklabs.com:8006/api2/json"

  storage:
    name: "QNAP NAS / Docker host"
    hostname: "nas.mcducklabs.com"
    alt_hostname: "docker.mcducklabs.com"
    ip: "192.168.2.106"
    vlan: 2
    trust_override: high
    trust_reason: "Operator-managed infrastructure (NAS + Docker host) — high traffic to/from VLAN 1 is expected backup/monitoring activity"
    type: "nas"
    vendor: "QNAP"
    capabilities:
      - "snmp_v3"
      - "storage_monitoring"
      - "syslog"
    data_sources:
      snmp:
        version: "3"
        username: "snmp"
        security_level: "noAuthNoPriv"
        notes: "Requires pfSense rule: docker host → 192.168.2.106 UDP 161"
      syslog:
        port: 5516
        setup: "Control Panel → System → Syslog Server → docker.mcducklabs.com:5516 UDP"

  proxmox_backup:
    name: "Proxmox Backup Server"
    hostname: "pbs.mcducklabs.com"
    ip: "192.168.2.8"
    vlan: 2
    type: "backup_server"
    vendor: "Proxmox"
    capabilities:
      - "vm_backup"
      - "ct_backup"
      - "verify_tasks"
      - "api"
    data_sources:
      api:
        endpoint: "https://192.168.2.8:8007/api2/json"
        notes: "Requires PBS API token (user@realm!tokenname + secret)"

  nvr:
    name: "Frigate NVR"
    hostname: "frigate.mcducklabs.com"
    ip: "192.168.2.7"
    vlan: 2
    type: "nvr"
    vendor: "Frigate"
    version: "0.17.1"
    detector: "Coral TPU"
    cameras:
      - name: "front_camera"
        rtsp: "camera-front.mcducklabs.com"
      - name: "back_yard"
        rtsp: "192.168.3.15"
      - name: "garage-main"
        rtsp: "192.168.3.13"
      - name: "garage-side"
        rtsp: "192.168.3.14"
      - name: "alley"
        rtsp: "camera-alley.mcducklabs.com"
    capabilities:
      - "rtsp_recording"
      - "object_detection"
      - "api"
    data_sources:
      api:
        endpoint: "http://192.168.2.7:5000"
        notes: "No auth required on API port"

  messaging_bot:
    name: "OpenClaw Bot Server"
    hostname: "openclaw"
    ip: "unknown"
    vlan: 2
    type: "server"
    notes: "Linux server running WhatsApp and Slack connector application. Sends syslog to central collector."
    data_sources:
      syslog:
        service_name: "openclaw"

  openwebui_server:
    name: "Open WebUI Server"
    hostname: "openwebui"
    ip: "unknown"
    vlan: 2
    type: "server"
    notes: "Linux server running Open WebUI (LLM interface) with Caddy reverse proxy and Postfix. Sends syslog."
    data_sources:
      syslog:
        service_name: "caddy"

monitoring_focus:
  security:
    - "Cross-VLAN traffic (especially to/from isolated VLANs 3 and 4)"
    - "pfSense firewall blocks and intrusion attempts"
    - "AdGuard DNS blocks (malware, phishing domains)"
    - "CrowdSec security alerts"
    - "Unknown devices on network"

  infrastructure:
    - "Disk space on all hosts"
    - "CPU and memory utilization"
    - "Network interface saturation"
    - "Service availability (Uptime Kuma)"

  validator:
    - "Attestation effectiveness"
    - "Missed attestations/proposals"
    - "Peer count (both consensus and execution)"
    - "Sync status"
    - "Balance changes"

  network:
    - "Top talkers per VLAN"
    - "Bandwidth utilization"
    - "Switch port errors"
    - "WiFi client count and performance"
