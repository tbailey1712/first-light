# UniFi AP Log Parser for OTel Collector
#
# This file contains the transform/unifi processor configuration.
#
# UniFi AP Log Format:
# <priority>timestamp hostname mac,model-firmware: daemon[pid]: interface: STA client_mac event_details
#
# Examples:
# <30>Mar  7 13:29:46 UnifiSecondFloorBack 784558e316c1,U6-LR-6.7.41+15623: hostapd[4413]: rai0: STA 60:fd:a6:6a:a1:46 RADIUS: starting accounting session
# <30>Mar  7 13:31:31 UnifiBasement b4fbe4a45e9e,U7-Pro-8.4.6+18068: hostapd[4411]: wifi1ap5: STA 00:12:47:78:c4:79 IEEE 802.11: disassociated
# <30>Mar  7 13:34:08 UniFiFirstFloorFront 784558e2fc35,U6-LR-6.7.41+15623: hostapd[4412]: rai0: STA 4a:dc:0f:5a:c0:2d IEEE 802.11: associated

transform/unifi:
  error_mode: ignore
  log_statements:
    - context: log
      statements:
        # Only process UniFi AP logs (identified by MAC,model-firmware pattern in hostname area)
        - set(attributes["_is_unifi"], "true") where IsMatch(body, "[a-f0-9]{12},[A-Z0-9]+-")

        # ===== Extract AP MAC Address =====
        # Format: 784558e316c1 (12 hex chars)
        - merge_maps(attributes, ExtractPatterns(body, "(?P<ap_mac>[a-f0-9]{12}),"), "upsert") where attributes["_is_unifi"] == "true"
        - set(attributes["unifi.ap_mac"], attributes["ap_mac"]) where attributes["ap_mac"] != nil
        - delete_key(attributes, "ap_mac") where attributes["ap_mac"] != nil

        # ===== Extract AP Model =====
        # Format: U6-LR, U7-Pro, UAP-AC-PRO, etc.
        - merge_maps(attributes, ExtractPatterns(body, ",(?P<model>[A-Z][A-Z0-9]+-[A-Z0-9-]+)-"), "upsert") where attributes["_is_unifi"] == "true"
        - set(attributes["unifi.ap_model"], attributes["model"]) where attributes["model"] != nil
        - delete_key(attributes, "model") where attributes["model"] != nil

        # ===== Extract Firmware Version =====
        # Format: 6.7.41+15623, 8.4.6+18068
        - merge_maps(attributes, ExtractPatterns(body, "-(?P<firmware>\\d+\\.\\d+\\.\\d+\\+\\d+):"), "upsert") where attributes["_is_unifi"] == "true"
        - set(attributes["unifi.firmware"], attributes["firmware"]) where attributes["firmware"] != nil
        - delete_key(attributes, "firmware") where attributes["firmware"] != nil

        # ===== Extract AP Hostname =====
        # Format: UnifiSecondFloorBack, UnifiBasement, UniFiFirstFloorFront
        # This is in the syslog hostname field, between timestamp and MAC
        - merge_maps(attributes, ExtractPatterns(body, "\\d{2}:\\d{2}:\\d{2}\\s+(?P<ap_hostname>[A-Za-z0-9_-]+)\\s+[a-f0-9]{12}"), "upsert") where attributes["_is_unifi"] == "true"
        - set(attributes["unifi.ap_hostname"], attributes["ap_hostname"]) where attributes["ap_hostname"] != nil
        - delete_key(attributes, "ap_hostname") where attributes["ap_hostname"] != nil

        # ===== Extract Daemon Name =====
        # Format: hostapd, wpa_supplicant, mcad
        - merge_maps(attributes, ExtractPatterns(body, ":\\s+(?P<daemon>\\w+)\\[\\d+\\]:"), "upsert") where attributes["_is_unifi"] == "true"
        - set(attributes["unifi.daemon"], attributes["daemon"]) where attributes["daemon"] != nil
        - delete_key(attributes, "daemon") where attributes["daemon"] != nil

        # ===== Extract Wireless Interface =====
        # Format: rai0, ra0, wifi0ap0, wifi1ap5, wlan0, wlan1
        - merge_maps(attributes, ExtractPatterns(body, "\\[\\d+\\]:\\s+(?P<interface>(?:ra|wifi|wlan)[a-z0-9]+):"), "upsert") where attributes["_is_unifi"] == "true"
        - set(attributes["unifi.interface"], attributes["interface"]) where attributes["interface"] != nil
        - delete_key(attributes, "interface") where attributes["interface"] != nil

        # ===== Extract Client MAC Address =====
        # Format: STA 60:fd:a6:6a:a1:46 or client_mac=4a:dc:0f:5a:c0:2d
        - merge_maps(attributes, ExtractPatterns(body, "STA\\s+(?P<client_mac>[0-9a-f]{2}:[0-9a-f]{2}:[0-9a-f]{2}:[0-9a-f]{2}:[0-9a-f]{2}:[0-9a-f]{2})"), "upsert") where attributes["_is_unifi"] == "true"
        - set(attributes["unifi.client_mac"], attributes["client_mac"]) where attributes["client_mac"] != nil
        - delete_key(attributes, "client_mac") where attributes["client_mac"] != nil

        # ===== Extract Event Type =====
        # Categorize common UniFi events
        - set(attributes["unifi.event_type"], "association") where attributes["_is_unifi"] == "true" and IsMatch(body, "IEEE 802\\.11: associated")
        - set(attributes["unifi.event_type"], "disassociation") where attributes["_is_unifi"] == "true" and IsMatch(body, "IEEE 802\\.11: disassociated")
        - set(attributes["unifi.event_type"], "deauthentication") where attributes["_is_unifi"] == "true" and IsMatch(body, "IEEE 802\\.11: deauthenticated")
        - set(attributes["unifi.event_type"], "reassociation") where attributes["_is_unifi"] == "true" and IsMatch(body, "IEEE 802\\.11: reassociated")
        - set(attributes["unifi.event_type"], "authentication") where attributes["_is_unifi"] == "true" and IsMatch(body, "IEEE 802\\.11: authenticated")
        - set(attributes["unifi.event_type"], "radius_session_start") where attributes["_is_unifi"] == "true" and IsMatch(body, "RADIUS: starting accounting session")
        - set(attributes["unifi.event_type"], "radius_session_stop") where attributes["_is_unifi"] == "true" and IsMatch(body, "RADIUS:.*?session.*?stop")
        - set(attributes["unifi.event_type"], "wpa_handshake") where attributes["_is_unifi"] == "true" and IsMatch(body, "WPA:")
        - set(attributes["unifi.event_type"], "roaming") where attributes["_is_unifi"] == "true" and IsMatch(body, "UBNT_ROAM")
        - set(attributes["unifi.event_type"], "sta_authorized") where attributes["_is_unifi"] == "true" and IsMatch(body, "AP-STA-CONNECTED")
        - set(attributes["unifi.event_type"], "sta_unauthorized") where attributes["_is_unifi"] == "true" and IsMatch(body, "AP-STA-DISCONNECTED")

        # ===== Extract Roaming Information =====
        # Format: UBNT_ROAM,client_mac=4a:dc:0f:5a:c0:2d,from_ap=b4fbe4a45e9e
        - merge_maps(attributes, ExtractPatterns(body, "from_ap=(?P<from_ap_mac>[a-f0-9]{12})"), "upsert") where IsMatch(body, "UBNT_ROAM")
        - set(attributes["unifi.roam_from_ap"], attributes["from_ap_mac"]) where attributes["from_ap_mac"] != nil
        - delete_key(attributes, "from_ap_mac") where attributes["from_ap_mac"] != nil

        # ===== Extract Disassociation/Deauth Reason =====
        # Format: due to inactivity (timer DEAUTH/REMOVE), reason=3, reason=1
        - merge_maps(attributes, ExtractPatterns(body, "reason=(?P<reason_code>\\d+)"), "upsert") where attributes["_is_unifi"] == "true"
        - set(attributes["unifi.reason_code"], attributes["reason_code"]) where attributes["reason_code"] != nil
        - delete_key(attributes, "reason_code") where attributes["reason_code"] != nil

        # ===== Extract Signal Strength (if present) =====
        # Format: signal=-48dBm
        - merge_maps(attributes, ExtractPatterns(body, "signal=(?P<signal>-?\\d+)dBm"), "upsert") where attributes["_is_unifi"] == "true"
        - set(attributes["unifi.signal_dbm"], attributes["signal"]) where attributes["signal"] != nil
        - delete_key(attributes, "signal") where attributes["signal"] != nil

        # ===== Extract Message Text =====
        # Get everything after the interface name
        - merge_maps(attributes, ExtractPatterns(body, "\\]:\\s+(?:[a-z0-9]+:)?\\s*(?P<message>.+)$"), "upsert") where attributes["_is_unifi"] == "true"
        - set(attributes["unifi.message"], attributes["message"]) where attributes["message"] != nil and attributes["_is_unifi"] == "true"
        - delete_key(attributes, "message") where attributes["message"] != nil and attributes["_is_unifi"] == "true"

        # ===== Categorize Event Severity =====
        - set(attributes["severity"], "info") where attributes["unifi.event_type"] == "association"
        - set(attributes["severity"], "info") where attributes["unifi.event_type"] == "reassociation"
        - set(attributes["severity"], "info") where attributes["unifi.event_type"] == "authentication"
        - set(attributes["severity"], "info") where attributes["unifi.event_type"] == "roaming"
        - set(attributes["severity"], "debug") where attributes["unifi.event_type"] == "radius_session_start"
        - set(attributes["severity"], "debug") where attributes["unifi.event_type"] == "wpa_handshake"
        - set(attributes["severity"], "warning") where attributes["unifi.event_type"] == "disassociation"
        - set(attributes["severity"], "warning") where attributes["unifi.event_type"] == "deauthentication"

        # ===== Flag Notable Events =====
        - set(attributes["unifi.notable"], "true") where attributes["unifi.event_type"] == "roaming"
        - set(attributes["unifi.notable"], "true") where attributes["unifi.reason_code"] != nil and attributes["unifi.reason_code"] != "3"  # reason 3 is normal inactivity

        # ===== Cleanup =====
        - delete_key(attributes, "_is_unifi") where attributes["_is_unifi"] != nil
